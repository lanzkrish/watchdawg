<!DOCTYPE html>
<html>
<head>
  <title>WorkSync Agent Login</title>
</head>

<body>

  <div class="card">
    <h2>WorkSync</h2>
    <p class="sub">Sign in to continue</p>

    <input id="email" type="email" placeholder="Work email" />
    <input id="password" type="password" placeholder="Password" />

    <button id="loginBtn" onclick="login()">Login</button>

    <p id="msg"></p>

    <div class="footer">
      <span onclick="forgot()">Forgot Password?</span>
    </div>
  </div>

  <script>
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("loginBtn");

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      msg.innerText = "";

      /* 🔒 VALIDATION */
      if (!email || !password) {
        return show("Please enter email and password");
      }

      setLoading(true);

      try {
        const res = await fetch("http://localhost:5000/api/agent/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          return show(data.message || "Login failed");
        }

        /* 🔐 SET AUTH (IPC handles navigation) */
        await window.electronAPI.setAuth(
          data.user.id,
          data.user.organizationId,
          data.token,
          data.user.firstLogin
        );

      } catch (err) {
        show("Network error ❌");
      } finally {
        setLoading(false);
      }
    }

    function setLoading(state) {
      btn.disabled = state;
      btn.innerText = state ? "Signing in..." : "Login";
    }

    function show(text) {
      msg.innerText = text;
    }

    function forgot() {
      window.electronAPI.loadForgotPassword();
    }

    /* ⌨️ ENTER KEY SUPPORT */
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>

  <style>
    body {
      margin: 0;
      background: #0b0f17;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 340px;
      padding: 28px;
      background: #111827;
      border-radius: 12px;
      border: 1px solid #1f2937;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 6px;
    }

    .sub {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      background: #0f172a;
      border: 1px solid #1f2937;
      color: white;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #22c55e;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: #22c55e;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 12px;
      font-size: 13px;
      color: #f87171;
      min-height: 16px;
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: #9ca3af;
      cursor: pointer;
    }

    .footer span:hover {
      color: #fff;
    }
  </style>

</body>
</html>
