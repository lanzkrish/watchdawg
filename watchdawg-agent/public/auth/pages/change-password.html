<!DOCTYPE html>
<html>
<head>
  <title>WorkSync - Change Password</title>
</head>

<body>

  <div class="card">
    <h2>Set Your Password</h2>
    <p class="sub">Secure your account to continue</p>

    <input id="oldInput" type="password" placeholder="Current Password" />
    <input id="newInput" type="password" placeholder="New Password" />
    <input id="confirmInput" type="password" placeholder="Confirm Password" />

    <button id="btn" onclick="changePassword()">Update Password</button>

    <p id="msg"></p>
  </div>

  <script>
    const oldInput = document.getElementById("oldInput");
    const newInput = document.getElementById("newInput");
    const confirmInput = document.getElementById("confirmInput");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    async function changePassword() {
      const oldPassword = oldInput.value.trim();
      const newPassword = newInput.value.trim();
      const confirmPassword = confirmInput.value.trim();

      msg.innerText = "";

      /* 🔒 VALIDATION */
      if (!oldPassword || !newPassword || !confirmPassword) {
        return show("All fields are required", "error");
      }

      if (newPassword.length < 6) {
        return show("Password must be at least 6 characters", "error");
      }

      if (newPassword !== confirmPassword) {
        return show("Passwords do not match", "error");
      }

      setLoading(true);

      try {
        const token = await window.electronAPI.getToken();

        console.log("TOKEN: ",token)

        const res = await fetch(
          "http://localhost:5000/api/agent/auth/change-password",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token,
            },
            body: JSON.stringify({
              oldPassword,
              newPassword,
            }),
          }
        );

        const data = await res.json();

        if (!res.ok) {
          return show(data.message || "Update failed", "error");
        }

        show("Password updated successfully ✅", "success");

        setTimeout(() => {
          window.electronAPI.loadConsent();
        }, 800);

      } catch (err) {
        show("Network error ❌", "error");
      } finally {
        setLoading(false);
      }
    }

    function setLoading(state) {
      btn.disabled = state;
      btn.innerText = state ? "Updating..." : "Update Password";
    }

    function show(text, type) {
      msg.innerText = text;
      msg.style.color = type === "error" ? "#f87171" : "#22c55e";
    }

    /* ENTER KEY SUPPORT */
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") changePassword();
    });
  </script>

  <style>
    body {
      margin: 0;
      background: #0b0f17;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 360px;
      padding: 30px;
      background: #111827;
      border-radius: 14px;
      border: 1px solid #1f2937;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45);
    }

    h2 {
      margin-bottom: 6px;
    }

    .sub {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #0f172a;
      border: 1px solid #1f2937;
      color: white;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 14px;
      font-size: 13px;
      min-height: 16px;
    }
  </style>

</body>
</html>
