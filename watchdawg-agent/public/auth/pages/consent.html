<!DOCTYPE html>
<html>
<head>
  <title>WorkSync Consent</title>
</head>

<body>

  <div class="card">
    <h2>Enable Tracking</h2>

    <p class="sub">
      WorkSync will monitor activity to generate productivity insights.
    </p>

    <div class="warning">
      • Screen activity may be recorded
      • Data is securely stored
      • Used only for work analytics
    </div>

    <button id="startBtn" onclick="start()">Start Tracking</button>
    <button class="secondary" onclick="logout()">Cancel</button>

    <p id="msg"></p>
  </div>

  <script>
    const btn = document.getElementById("startBtn");
    const msg = document.getElementById("msg");

    async function start() {
      setLoading(true);

      try {
        await window.electronAPI.startTracking();
        // ⚠️ DO NOT manually navigate → IPC handles it
      } catch (err) {
        show("Failed to start tracking ❌", "error");
        setLoading(false);
      }
    }

    function logout() {
      window.electronAPI.logout();
    }

    function setLoading(state) {
      btn.disabled = state;
      btn.innerText = state ? "Starting..." : "Start Tracking";
    }

    function show(text, type) {
      msg.innerText = text;
      msg.style.color = type === "error" ? "#f87171" : "#22c55e";
    }
  </script>

  <style>
    body {
      margin: 0;
      background: #0b0f17;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 360px;
      padding: 30px;
      background: #111827;
      border-radius: 14px;
      border: 1px solid #1f2937;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45);
    }

    h2 {
      margin-bottom: 10px;
    }

    .sub {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .warning {
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #d1d5db;
      text-align: left;
      margin-bottom: 18px;
      line-height: 1.6;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px;
      transition: 0.2s;
    }

    #startBtn {
      background: #22c55e;
      color: black;
    }

    #startBtn:hover {
      background: #16a34a;
    }

    .secondary {
      background: #374151;
      color: white;
    }

    .secondary:hover {
      background: #4b5563;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 14px;
      font-size: 13px;
      min-height: 16px;
    }
  </style>

</body>
</html>
