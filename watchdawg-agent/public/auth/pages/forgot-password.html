<!DOCTYPE html>
<html>
<head>
  <title>WorkSync Reset Password</title>
</head>

<body>

  <div class="card">
    <h2>Reset Password</h2>
    <p class="sub">Enter your work email to receive reset instructions</p>

    <input id="email" type="email" placeholder="Work email" />

    <button id="btn" onclick="handleReset()">Send Reset Link</button>

    <p id="msg"></p>

    <div class="footer">
      <span onclick="goBack()">← Back to Login</span>
    </div>
  </div>

  <script>
    const emailInput = document.getElementById("email");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    async function handleReset() {
      const email = emailInput.value.trim();
      msg.innerText = "";

      if (!email) {
        return show("Please enter your email", "error");
      }

      setLoading(true);

      try {
        const res = await fetch("http://localhost:5000/api/agent/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (!res.ok) {
          return show(data.message || "Request failed", "error");
        }

        show("Reset instructions sent to your email ✅", "success");
      } catch (err) {
        show("Network error ❌", "error");
      } finally {
        setLoading(false);
      }
    }

    function setLoading(state) {
      btn.disabled = state;
      btn.innerText = state ? "Sending..." : "Send Reset Link";
    }

    function show(text, type) {
      msg.innerText = text;
      msg.style.color = type === "error" ? "#f87171" : "#22c55e";
    }

    function goBack() {
      window.electronAPI.loadLogin();
    }

    /* ENTER KEY SUPPORT */
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleReset();
    });
  </script>

  <style>
    body {
      margin: 0;
      background: #0b0f17;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 340px;
      padding: 28px;
      background: #111827;
      border-radius: 12px;
      border: 1px solid #1f2937;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 6px;
    }

    .sub {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      background: #0f172a;
      border: 1px solid #1f2937;
      color: white;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 12px;
      font-size: 13px;
      min-height: 16px;
    }

    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: #9ca3af;
      cursor: pointer;
    }

    .footer span:hover {
      color: #fff;
    }
  </style>

</body>
</html>
