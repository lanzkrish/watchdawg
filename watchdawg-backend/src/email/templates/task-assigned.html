<!doctype html>
<html>
  <body
    style="
      font-family:
        Segoe UI,
        Arial;
      background: #0f172a;
      padding: 30px;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: auto;
        background: #111827;
        border-radius: 12px;
        padding: 30px;
        color: #e5e7eb;
      "
    >
      <h2 style="color: #3b82f6">📋 New Task Assigned</h2>

      <p>Hello <b>{{name}}</b>,</p>

      <p>You have been assigned a new task:</p>

      <div
        style="
          background: #1f2937;
          padding: 15px;
          border-radius: 8px;
          margin: 20px 0;
        "
      >
        <p><b>Title:</b> {{title}}</p>
        <p><b>Description:</b> {{description}}</p>
        <p><b>Priority:</b> {{priority}}</p>
        <p><b>Deadline:</b> {{deadline}}</p>
      </div>

      <a
        href="#"
        style="
          padding: 10px 18px;
          background: #3b82f6;
          color: #fff;
          border-radius: 6px;
          text-decoration: none;
        "
      >
        View Task
      </a>

      <hr style="margin: 25px 0; border-color: #374151" />

      <p style="font-size: 12px; color: #9ca3af">WorkSync • Do not reply</p>
    </div>
  </body>
</html>
