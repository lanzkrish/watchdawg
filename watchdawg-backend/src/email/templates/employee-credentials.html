<!DOCTYPE html>
<html>
  <body style="font-family:Segoe UI,Arial;background:#0f172a;padding:30px;">
    <div style="max-width:600px;margin:auto;background:#111827;border-radius:12px;padding:30px;color:#e5e7eb;">

      <h2 style="color:#22c55e;">🚀 Welcome to WorkSync</h2>

      <p>Hello <b>{{name}}</b>,</p>

      <p>Your account has been successfully created.</p>

      <div style="background:#1f2937;padding:15px;border-radius:8px;margin:20px 0;">
        <p><b>Employee ID:</b> {{employeeId}}</p>
        <p><b>Password:</b> {{password}}</p>
      </div>

      <p style="color:#fbbf24;">
        🔑 You can login using <b>Employee ID or Email</b>
      </p>

      <p style="color:#f87171;">
        ⚠️ Please change your password after first login
      </p>

      <a href="#" style="display:inline-block;margin-top:10px;padding:10px 18px;background:#22c55e;color:#000;border-radius:6px;text-decoration:none;font-weight:600;">
        Login to WorkSync
      </a>

      <hr style="margin:25px 0;border-color:#374151;" />

      <p style="font-size:12px;color:#9ca3af;">
        WorkSync System • This is a no-reply email
      </p>

    </div>
  </body>
</html>
